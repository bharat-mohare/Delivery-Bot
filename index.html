<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Delivery Bot</title>

<style>

body{

margin:0;
padding:0;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

.container{

padding:20px;
}

h1{

font-size:38px;
margin-top:10px;
}

.status{

margin-top:10px;
font-size:20px;
font-weight:bold;
}

.connected{

color:#00ff88;
}

.disconnected{

color:red;
}

.controls{

margin-top:30px;
}

.row{

display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:15px;
}

button{

width:100px;
height:100px;
font-size:35px;
border:none;
border-radius:25px;
background:#00bcd4;
color:white;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
transition:0.2s;
}

button:active{

transform:scale(0.92);
}

.stop{

background:red;
}

.runBtn{

margin-top:20px;
width:180px;
height:70px;
font-size:28px;
background:#22c55e;
}

.wifiBtn{

margin-top:20px;
width:220px;
height:70px;
font-size:24px;
background:#f59e0b;
}

input{

width:80%;
max-width:500px;
padding:18px;
font-size:20px;
border:none;
border-radius:15px;
outline:none;
}

.info{

margin-top:30px;
line-height:35px;
font-size:18px;
color:#cbd5e1;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 DELIVERY BOT</h1>

<div id="status"
class="status disconnected">

DISCONNECTED

</div>

<!-- CONTROLS -->

<div class="controls">

<div class="row">

<button onclick="send('W')">

↑

</button>

</div>

<div class="row">

<button onclick="send('A')">

←

</button>

<button class="stop"
onclick="send('X')">

STOP

</button>

<button onclick="send('D')">

→

</button>

</div>

<div class="row">

<button onclick="send('S')">

↓

</button>

</div>

</div>

<!-- AUTOMATION -->

<h2>Automation</h2>

<input id="route"
placeholder="F200,R90,F100">

<br>

<button class="runBtn"
onclick="sendRoute()">

RUN

</button>

<br>

<button class="wifiBtn"
onclick="resetWifi()">

CHANGE WIFI

</button>

<div class="info">

W → Forward<br>
S → Reverse<br>
A → Left<br>
D → Right<br>
SPACE → Emergency Stop

</div>

</div>

<script>

// =====================================================
// WEBSOCKET
// =====================================================

let gateway =
"ws://robot.local:81/";

let websocket;

// =====================================================
// CONNECT
// =====================================================

function initWebSocket(){

websocket =
new WebSocket(gateway);

websocket.onopen = function(){

document.getElementById(
"status").innerHTML =
"CONNECTED";

document.getElementById(
"status").className =
"status connected";
};

websocket.onclose = function(){

document.getElementById(
"status").innerHTML =
"DISCONNECTED";

document.getElementById(
"status").className =
"status disconnected";

setTimeout(
initWebSocket,
2000);
};
}

// =====================================================
// SEND
// =====================================================

function send(cmd){

if(websocket &&
websocket.readyState === 1){

websocket.send(cmd);
}
}

// =====================================================
// ROUTE
// =====================================================

function sendRoute(){

let route =
document.getElementById(
"route").value;

send(route);
}

// =====================================================
// RESET WIFI
// =====================================================

function resetWifi(){

let ok =
confirm(
"Reset WiFi settings?");

if(ok){

send("RESET_WIFI");
}
}

// =====================================================
// KEYBOARD
// =====================================================

document.addEventListener(
'keydown',
function(event){

let key =
event.key.toLowerCase();

if(key=='w') send('W');

if(key=='a') send('A');

if(key=='s') send('S');

if(key=='d') send('D');

if(event.code=='Space'){

event.preventDefault();

send('X');
}
});

// =====================================================
// AUTO STOP
// =====================================================

document.addEventListener(
'keyup',
function(){

send('X');
});

// =====================================================
// START
// =====================================================

window.onload =
initWebSocket;

</script>

</body>

</html>
