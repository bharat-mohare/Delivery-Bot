<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Delivery Bot</title>

<style>

body{

margin:0;
padding:0;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.container{

padding:20px;
}

h1{

font-size:40px;
margin-top:10px;
}

.status{

font-size:22px;
font-weight:bold;
margin-top:10px;
}

.connected{

color:#00ff88;
}

.disconnected{

color:red;
}

.controls{

margin-top:40px;
}

.row{

display:flex;
justify-content:center;
gap:20px;
margin:20px;
}

button{

width:100px;
height:100px;
font-size:35px;
border:none;
border-radius:25px;
background:#00bcd4;
color:white;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

button:active{

transform:scale(0.92);
}

.stop{

background:red;
}

.wifiBtn{

margin-top:30px;
width:220px;
height:70px;
font-size:22px;
background:#f59e0b;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 DELIVERY BOT</h1>

<div id="status"
class="status disconnected">

DISCONNECTED

</div>

<div class="controls">

<div class="row">

<button
ontouchstart="pressForward()"
onmousedown="pressForward()">

↑

</button>

</div>

<div class="row">

<button
ontouchstart="pressLeft()"
onmousedown="pressLeft()">

←

</button>

<button class="stop"
onclick="pressStop()">

STOP

</button>

<button
ontouchstart="pressRight()"
onmousedown="pressRight()">

→

</button>

</div>

<div class="row">

<button
ontouchstart="pressBackward()"
onmousedown="pressBackward()">

↓

</button>

</div>

</div>

<button class="wifiBtn"
onclick="resetWifi()">

CHANGE WIFI

</button>

</div>

<script>

let gateway =
"ws://robot.local:81";

let websocket;

// current active command
let currentCommand = "X";

// =====================================================
// CONNECT
// =====================================================

function initWebSocket(){

  websocket =
  new WebSocket(gateway);

  websocket.onopen = () => {

    console.log(
      "CONNECTED");

    document.getElementById(
      "status").innerHTML =
      "CONNECTED";

    document.getElementById(
      "status").className =
      "status connected";
  };

  websocket.onclose = () => {

    console.log(
      "DISCONNECTED");

    document.getElementById(
      "status").innerHTML =
      "DISCONNECTED";

    document.getElementById(
      "status").className =
      "status disconnected";

    setTimeout(
      initWebSocket,
      3000);
  };

  websocket.onerror = (e) => {

    console.log(
      "WS ERROR",
      e);
  };
}

// =====================================================
// SEND ONLY IF CHANGED
// =====================================================

function sendCommand(cmd){

  // prevent spam
  if(cmd === currentCommand)
    return;

  currentCommand = cmd;

  if(websocket &&
     websocket.readyState === 1){

    websocket.send(cmd);

    console.log(
      "SENT:",
      cmd);
  }
}

// =====================================================
// BUTTON FUNCTIONS
// =====================================================

function pressForward(){

  sendCommand("W");
}

function pressBackward(){

  sendCommand("S");
}

function pressLeft(){

  sendCommand("A");
}

function pressRight(){

  sendCommand("D");
}

function pressStop(){

  sendCommand("X");
}

// =====================================================
// TOUCH RELEASE
// =====================================================

document.addEventListener(
"touchend",
function(){

  sendCommand("X");
});

// =====================================================
// KEYBOARD
// =====================================================

document.addEventListener(
"keydown",
function(event){

  // stop repeat flooding
  if(event.repeat)
    return;

  let key =
    event.key.toLowerCase();

  if(key == "w"){

    sendCommand("W");
  }

  else if(key == "s"){

    sendCommand("S");
  }

  else if(key == "a"){

    sendCommand("A");
  }

  else if(key == "d"){

    sendCommand("D");
  }

  else if(event.code == "Space"){

    event.preventDefault();

    sendCommand("X");
  }
});

// =====================================================
// KEY RELEASE
// =====================================================

document.addEventListener(
"keyup",
function(){

  sendCommand("X");
});

// =====================================================
// RESET WIFI
// =====================================================

function resetWifi(){

  let ok =
  confirm(
    "Reset WiFi settings?");

  if(ok){

    sendCommand(
      "RESET_WIFI");
  }
}

// =====================================================
// START
// =====================================================

window.onload =
initWebSocket;

</script>

</body>

</html>
